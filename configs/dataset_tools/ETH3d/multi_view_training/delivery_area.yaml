    camera_model: pinhole
    original_resolution: [752, 480]
    original_intrinsics: [541.911, 541.618, 413.804, 216.021] #fx, fy, cu, cv
    distortion_model: thin_prism_fisheye
    distortion_coeffs: [-0.073603, -0.0389836, 0.000245096, -0.000164134, 0.0488935, -0.0407165, 0.00180289, 0.00883219] #k1,k2,p1,p2,k3,k4,sx1,sy1
    xyz_scale_factor: [1.0, 1.0, 1.0]
    down_sample_rate: 1.0

  sensor3d1:
    id: 1
    sensor3dtype: imagedepth
    camera_id: 0
    name: gt_depth_in_cam5_plane
    sensor3dpath: /mnt/lboro_nas/personal/Zhipeng/eth3d/multi_view_training_rig_depth/delivery_area_rig_depth/delivery_area/ground_truth_depth/images_rig_cam5
    camera_model: pinhole
    original_resolution: [752, 480]
    original_intrinsics: [538.731, 538.615, 413.003, 244.558] #fx, fy, cu, cv
    distortion_model: thin_prism_fisheye
    distortion_coeffs: [-0.0654481, -0.0781379, -0.00131596, 0.00171383, 0.115547, -0.0710756, -0.0103304, 0.00700661] #k1,k2,p1,p2,k3,k4,sx1,sy1
    xyz_scale_factor: [1.0, 1.0, 1.0]
    down_sample_rate: 1.0

  


data_source1:
  trajectoryname: eth3d
  trajectorytype: poses_for_all_cameras
  trajectory_path: /mnt/lboro_nas/personal/Zhipeng/eth3d/multi_view_training_rig/delivery_area/rig_calibration/images.txt
  used_sensor3d_idxes: [0, 1]
  num_cumulation: [0, 0] # if there are two used sensor3ds, you need to specify two numbers of cumulation.
