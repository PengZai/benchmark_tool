# %YAML:1.1 # need to specify the file type at the top!


system:
  use_data_source: 1
  # start_idx: 25
  # end_idx: 40
  start_idx: 0
  end_idx: 20
  maximum_depth_for_depthimage: 100
  minimum_depth_for_depthimage: 0.001
  maximum_z_for_pointcloud: 100 # lidar reliable distance is 100 meter maximum
  minimum_z_for_pointcloud: 0.001
  isFilterDepthByKNN: false
  K_for_filterdepth: 1

output:
  isOutput: true
  path: /mnt/lboro_nas/personal/Zhipeng/wai_data/ETH3d_delivery_area_1
  isSaveVisualizationDepthImage: true
  maximum_depth_for_vis_depthimage: -1
  minimum_depth_for_vis_depthimage: -1


visualization:
  isVisualization: true


# images_rig_cam7 -> CAMERA_ID 2
# images_rig_cam6 -> CAMERA_ID 3
# images_rig_cam5 -> CAMERA_ID 0
# images_rig_cam4 -> CAMERA_ID 1


cameras:
  camera0:
    id: 1
    name: images_rig_cam4_undistorted
    imagepath: /mnt/lboro_nas/personal/Zhipeng/eth3d/multi_view_training_rig/delivery_area/images/images_rig_cam4
    camera_model: pinhole
    original_resolution: [752, 480]
    original_intrinsics: [541.911, 541.618, 413.804, 216.021] #fx, fy, cu, cv
    distortion_model: thin_prism_fisheye
    distortion_coeffs: [-0.073603, -0.0389836, 0.000245096, -0.000164134, 0.0488935, -0.0407165, 0.00180289, 0.00883219] #k1,k2,p1,p2,k3,k4,sx1,sy1
    resolution: [752, 480] # width x height, don't larger than original resolution

  camera1:
    id: 0
    name: images_rig_cam5_undistorted
    imagepath: /mnt/lboro_nas/personal/Zhipeng/eth3d/multi_view_training_rig/delivery_area/images/images_rig_cam5
    camera_model: pinhole
    original_resolution: [752, 480]
    original_intrinsics: [538.731, 538.615, 413.003, 244.558] #fx, fy, cu, cv
    distortion_model: thin_prism_fisheye
    distortion_coeffs: [-0.0654481, -0.0781379, -0.00131596, 0.00171383, 0.115547, -0.0710756, -0.0103304, 0.00700661] #k1,k2,p1,p2,k3,k4,sx1,sy1
    resolution: [752, 480] # width x height, don't larger than original resolution

# GT depth
sensor3ds:
