# String for model factory
model_str: "hloc"
# Model config
model_config:
  name: "hloc"
  # Directory used for temporary HLoc/COLMAP working files.
  # Pick a writable location with enough disk space.
  cache_dir: "${root_pretrained_checkpoints_dir}/hloc_cache"

  # Main switch for the matching pipeline.
  # Supported sparse modules: "superpoint", "sift", "loma"
  # Supported dense modules: "loftr", "efficient_loftr", "roma", "romav2"
  #
  # Sparse modules use:
  #   extract_features -> match_features -> reconstruction
  #
  # Dense modules use:
  #   match_dense -> reconstruction
  #
  # In the installed `benchmark-hloc` environment, LoMA is a sparse feature
  # extractor + matcher pair, so it belongs to the sparse path rather than
  # the dense path.
  #
  # Note: your installed HLoc package must actually expose the selected module/config.
  module: "superpoint"

  # Sparse-pipeline feature extractor config.
  # Only used when module is "superpoint", "sift", or "loma".
  # Leave null to use the wrapper default:
  #   superpoint -> "superpoint_max"
  #   sift       -> "sift"
  #   loma       -> "loma_aachen"
  #
  # Common examples from your installed HLoc:
  #   "superpoint_aachen"
  #   "superpoint_max"
  #   "superpoint_inloc"
  #   "sift"
  #   "loma_aachen"
  #   "loma_inloc"
  feature_conf: loma_aachen

  # Sparse-pipeline matcher config.
  # Only used when module is "superpoint", "sift", or "loma".
  # Leave null to use the wrapper default:
  #   superpoint -> "superglue"
  #   sift       -> "NN-mutual"
  #   loma       -> "loma"
  #
  # Common examples:
  #   "superglue"
  #   "superglue-fast"
  #   "NN-mutual"
  #   "NN-ratio"
  #   "adalam"
  #   "loma"
  matcher_conf: loma

  # Dense matching config.
  # Only used when module is one of the dense options:
  #   "loftr", "efficient_loftr", "roma", "romav2"
  #
  # Leave null to use the wrapper default matching the module name.
  # For example:
  #   module: "loftr"  -> dense_matcher_conf defaults to "loftr"
  #   module: "efficient_loftr" -> dense_matcher_conf defaults to "efficient_loftr"
  #   module: "roma"   -> dense_matcher_conf defaults to "roma"
  #   module: "romav2" -> dense_matcher_conf defaults to "romav2"
  #
  # Override this only if your HLoc install exposes a custom dense config name.
  dense_matcher_conf: null

  # How image pairs are built before matching.
  # Currently only "exhaustive" is implemented in the wrapper,
  # which means every image is matched with every other image.
  # This is simple and robust for short benchmark clips, but scales poorly
  # for long sequences.
  pair_mode: "exhaustive"

  # If true, the benchmark intrinsics are written to COLMAP/HLoc and reused
  # as priors during reconstruction. Usually keep this enabled for calibrated data.
  # Set false only if you want HLoc/COLMAP to estimate intrinsics on its own.
  #
  # Note: the current "reconstruction with poses" path in HLoc mainly uses the
  # provided camera poses as initialization for triangulation + bundle adjustment.
  # The wrapper still exposes this flag for the standard incremental path.
  use_input_intrinsics: true

  # If true, switch from standard incremental mapping to HLoc's
  # `reconstruction_with_poses.py` path:
  #   import matches -> initialize cameras from input poses ->
  #   triangulate_points -> bundle_adjustment
  #
  # This is useful when the benchmark already provides reasonable camera poses
  # and you want HLoc to use them as initialization instead of rebuilding poses
  # from scratch.
  use_input_poses_as_init_guess: false

  # If true, COLMAP bundle adjustment will avoid refining focal length / extra
  # intrinsic parameters. This is usually the safer choice when your intrinsics
  # are trusted and already correspond to the cropped benchmark images.
  # Set false if you want COLMAP to optimize camera intrinsics.
  no_refine_intrinsics: true

  # If true, skip geometric verification before reconstruction.
  # Faster, but usually less robust. Keeping this false is recommended.
  skip_geometric_verification: false

  # Minimum number of registered images required for a valid reconstruction model.
  # Increase this if you want to reject tiny / unstable reconstructions.
  min_model_size: 2

  # Number of CPU threads passed into COLMAP / pycolmap where supported.
  # Increase on larger machines; reduce if you want lighter CPU usage.
  n_threads: 16

  # Only used by dense matchers (LoFTR/RoMa/etc.).
  # Caps the number of aggregated keypoints per image after dense matching.
  # Higher values may improve coverage but use more memory and time.
  # `null` would mean "do not cap", but 8192 is a practical default.
  max_kps: 8192

  # If true, print more HLoc/COLMAP logs during runtime.
  # Helpful for debugging failed reconstructions.
  verbose: false

  # Optional pycolmap IncrementalTriangulatorOptions overrides used only when
  # `use_input_poses_as_init_guess: true`.
  # Leave as {} to keep HLoc/pycolmap defaults.
  triangulation_options: {}

  # Optional pycolmap BundleAdjustmentOptions overrides used only when
  # `use_input_poses_as_init_guess: true`.
  # Leave as {} to keep HLoc/pycolmap defaults.
  bundle_adjustment_options: {}
# HLoc uses the raw cropped benchmark image saved in the dataloader output
data_norm_type: "dummy"
pretrained: null
torch_hub_force_reload: false
# Sparse SfM usually benefits from a bit more image detail than the dense models
test_resolution: [640, 480]
postprocessing:
  isAffineRefineDepthWithInputDepth: false
  isConsistencyCheck: false
  isJustCompareNearDistance: false
  maximum_near_distance: 10
