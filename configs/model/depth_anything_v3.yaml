# String for model factory
model_str: "da3"
# Model config
model_config:
  name: "da3"
  # HF model string
  # hf_model_name: "depth-anything/DA3-GIANT-1.1"
  hf_model_name: "depth-anything/DA3NESTED-GIANT-LARGE-1.1"
  isInputIntrinsics: true
  isInputCameraPoses: true
  # Geometric input config
# Image Normalization Type
data_norm_type: "dinov2"
# DA3 checkpoint is already loaded in the inference wrapper
pretrained: null
# Torch hub force reload
torch_hub_force_reload: False
test_resolution: [518, 336]
postprocessing:
  isAffineRefineDepthWithInputDepth: true
  isConsistencyCheck: true
  isJustCompareNearDistance: false
  maximum_near_distance: 10 # unit metter